<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightfall UI Mockup</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

.panel {
  width: 620px;
  background: rgba(15, 15, 25, 0.92);
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 0;
  color: #e0e0e0;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}

.row {
  display: flex;
  align-items: center;
  padding: 0 28px;
  height: 56px;
  gap: 12px;
}

.top-row {
  height: 52px;
  justify-content: space-between;
  padding: 0 14px;
}

.host {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.45);
  font-weight: 400;
  padding-left: 8px;
}

.brand {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.5px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.top-row-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  position: relative;
}

.exit-btn {
  padding: 6px 16px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.5);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  padding-right: 8px;
}

.exit-btn:hover {
  background: rgba(220, 50, 50, 0.3);
  color: #fff;
  border-color: rgba(220, 50, 50, 0.5);
}

.center-row {
  height: 64px;
  justify-content: center;
  gap: 16px;
}

.bottom-row {
  height: 64px;
  justify-content: center;
  gap: 16px;
  margin-top: 8px;
}

.status-row {
  height: 40px;
  justify-content: center;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.35);
}

.grab-bar {
  height: 14px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 0 0 24px 24px;
  cursor: grab;
}

.btn {
  padding: 10px 20px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #e0e0e0;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  min-width: 120px;
  text-align: center;
}

.btn:hover {
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(255, 255, 255, 0.2);
}

.btn:active {
  background: rgba(255, 255, 255, 0.18);
  transform: scale(0.97);
}

.btn .label {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.4);
  margin-bottom: 2px;
}

.btn .value {
  font-size: 14px;
  font-weight: 500;
  color: #fff;
}
</style>
</head>
<body>

<div class="panel">
  <div class="row top-row">
    <div class="top-row-inner">
      <div class="host">DESKTOP-ABC</div>
      <div class="brand">Nightfall</div>
      <button class="exit-btn">Exit</button>
    </div>
  </div>

  <div class="row center-row">
    <button class="btn">
      <div class="label">Passthrough</div>
      <div class="value">On</div>
    </button>
    <button class="btn">
      <div class="label">Curve</div>
      <div class="value">Flat</div>
    </button>
    <button class="btn">
      <div class="label">Bezel</div>
      <div class="value">On</div>
    </button>
  </div>

  <div class="row bottom-row">
    <button class="btn">
      <div class="label">Mode</div>
      <div class="value">2D</div>
    </button>
    <button class="btn">
      <div class="label">Resolution</div>
      <div class="value">Auto</div>
    </button>
    <button class="btn">
      <div class="label">Refresh</div>
      <div class="value">60Hz</div>
    </button>
  </div>

  <div class="row status-row">
    Connected to 10.0.0.13 &bull; 1920×1080 &bull; 60fps &bull; 12ms latency
  </div>

  <div class="grab-bar"></div>
</div>

</body>
</html>
